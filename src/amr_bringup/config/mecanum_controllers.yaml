controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 0.5  # nếu sau 0.5s không có lệnh điều khiển thì v = 0 m/s | tránh trôi 
    use_stamped_vel: false            # nhận geometry_msgs/Twist thay vì TwistStamped

    front_left_wheel_command_joint_name:  "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_right_wheel_command_joint_name:  "rear_right_wheel_joint"
    rear_left_wheel_command_joint_name:   "rear_left_wheel_joint"

    kinematics:
      base_frame_offset: {x: 0.0, y: 0.0, theta: 0.0}
      wheels_radius: 0.075                              # = wheel_radius trong urdf.xacro
      sum_of_robot_center_projection_on_X_Y_axis: 0.30   # lx+ly = wheel_sep_x/2 + wheel_sep_y/2 = 0.14 + 0.16

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    enable_odom_tf: true
    # FIX (changelog mục A6): [0.001]*6 là giá trị lý tưởng hóa kiểu planar_move
    # cũ — không phản ánh sai số tích lũy thực tế do trượt bánh (mu2=0.8,
    # slip1/slip2 đã bật ở urdf.xacro). Tăng lên mức phản ánh thực tế hơn.
    twist_covariance_diagonal: [0.01, 0.01, 0.01, 0.01, 0.01, 0.02]
    pose_covariance_diagonal:  [0.01, 0.01, 0.01, 0.01, 0.01, 0.02]
