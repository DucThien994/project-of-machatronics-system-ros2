controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 0.5
    use_stamped_vel: false      # → topic reference_unstamped (Twist thường)
    front_left_wheel_command_joint_name:  "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_right_wheel_command_joint_name:  "rear_right_wheel_joint"
    rear_left_wheel_command_joint_name:   "rear_left_wheel_joint"
    kinematics:
      base_frame_offset: {x: 0.0, y: 0.0, theta: 0.0}
      wheels_radius: 0.075
      sum_of_robot_center_projection_on_X_Y_axis: 0.30
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    enable_odom_tf: true

    # A6: covariance theo độ phân giải encoder + trượt bánh thực tế (Phụ lục D)
    # thay vì [0.001]*6 lý tưởng hóa của bản cũ.
    twist_covariance_diagonal: [0.01, 0.01, 0.01, 0.01, 0.01, 0.02]
    pose_covariance_diagonal:  [0.01, 0.01, 0.01, 0.01, 0.01, 0.02]

    # FIX: MecanumDriveController mặc định publish /tf với Durability = TRANSIENT_LOCAL,
    # trong khi robot_state_publisher và amcl publish /tf với VOLATILE.
    # RViz2 (và các subscriber /tf khác) mở SAU khi controller đã chạy sẽ không nhận được
    # transform odom -> base_footprint theo thời gian thực => robot/lidar bị "đứng hình"
    # tại vị trí ban đầu dù Gazebo vẫn di chuyển robot thật sự.
    qos_overrides:
      /tf:
        publisher:
          durability: volatile

