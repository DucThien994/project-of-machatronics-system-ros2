amcl:
  ros__parameters:
    use_sim_time: true
    robot_model_type: "nav2_amcl::OmniMotionModel"
    base_frame_id:    "base_footprint"
    odom_frame_id:    "odom"
    global_frame_id:  "map"
    scan_topic:       scan
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    beam_skip_distance:        0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold:       0.3
    do_beamskip:               false
    lambda_short:              0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range:           12.0
    laser_min_range:           0.12  # nhỏ hơn 0.12m thì không quét    
    laser_model_type:          "likelihood_field"
    max_beams:                 60
    max_particles:             2000
    min_particles:             500
    pf_err:  0.05
    pf_z:    0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval:   1
    save_pose_rate:       0.5
    sigma_hit:            0.2
    tf_broadcast:         true
    transform_tolerance:  1.0
    update_min_a:         0.1
    update_min_d:         0.1
    z_hit:   0.5
    z_max:   0.05
    z_rand:  0.5
    z_short: 0.05

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame:      map
    robot_base_frame:  base_footprint
    odom_topic:        /odom
    bt_loop_duration:  10
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold:     0.001
    min_y_velocity_threshold:     0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins:    ["general_goal_checker"]
    controller_plugins:      ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance:  10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:  0.05
      yaw_goal_tolerance: 0.05

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps:   56
      model_dt:     0.05
      batch_size:   2000
      vx_std:       0.2
      vy_std:       0.08      
      wz_std:       0.8
      vx_max:       0.75
      vx_min:      -0.50
      vy_max:       0.75   
      vy_min:      -0.50
      wz_max:       2.0
      iteration_count:    1
      prune_distance:     1.7
      transform_tolerance: 0.1
      temperature:  0.3
      gamma:        0.015
      motion_model: "Omni"   
      visualize:    false
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", 
                "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", 
                "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power:  1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power:  1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power:  1
        #tang he so de ep goc
        cost_weight: 8.0
        threshold_to_consider: 1.0
      PreferForwardCritic:
        # BẬT: xe ưu tiên đi thẳng đầu lên; lateral chỉ dùng khi path yêu cầu
        enabled: true
        cost_power:  1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power:  1
        cost_weight: 3.81
        critical_cost:     300.0
        consider_footprint: true
        collision_cost:    50000.0
        near_goal_distance: 1.0
      PathAlignCritic:
        enabled: true
        cost_power:  1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step:    3
        threshold_to_consider:    0.4
        offset_from_furthest:     20
        use_path_orientations:    false
      PathFollowCritic:
        enabled: true
        cost_power:  1
        cost_weight: 5.0
        offset_from_furthest:  5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power:  1
        cost_weight: 4.5
        offset_from_furthest:     4
        threshold_to_consider:    0.4
        max_angle_to_furthest:    1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency:   10.0
      publish_frequency:   5.0
      global_frame:       odom
      robot_base_frame:   base_footprint
      rolling_window:     true
      width:  4
      height: 4
      resolution: 0.05
      footprint: "[[-0.22, -0.19], [-0.22, 0.19], [0.22, 0.19], [0.22, -0.19]]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled:              true
        publish_voxel_map:    true
        origin_z:             0.0
        z_resolution:         0.05
        z_voxels:             16
        max_obstacle_height:  2.0
        mark_threshold:       0
        observation_sources:  scan
        scan:
          topic:               /scan
          max_obstacle_height: 2.0
          clearing:            true
          marking:             true
          data_type:           "LaserScan"
          raytrace_max_range:  3.0
          raytrace_min_range:  0.12
          obstacle_max_range:  2.5
          obstacle_min_range:  0.12
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 15.0    
        inflation_radius:    0.35     
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency:   5.0
      publish_frequency:  5.0
      global_frame:       map
      robot_base_frame:   base_footprint
      footprint: "[[-0.22, -0.19], [-0.22, 0.19], [0.22, 0.19], [0.22, -0.19]]"
      resolution:         0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic:               /scan
          max_obstacle_height: 2.0
          clearing:            true
          marking:             true
          data_type:           "LaserScan"
          raytrace_max_range:  3.0
          raytrace_min_range:  0.12
          obstacle_max_range:  2.5
          obstacle_min_range:  0.12
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 15.0     
        inflation_radius:    0.35     
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout:              5.0
    free_thresh_default:           0.25
    occupied_thresh_default:       0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin:        "nav2_navfn_planner/NavfnPlanner"
      tolerance:     0.5
      use_astar:     false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin:         "nav2_smoother::SimpleSmoother"
      tolerance:      1.0e-10
      max_its:        1000
      do_refinement:  true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic:   local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:             {plugin: "nav2_behaviors/Spin"}
    backup:           {plugin: "nav2_behaviors/BackUp"}
    drive_on_heading: {plugin: "nav2_behaviors/DriveOnHeading"}
    wait:             {plugin: "nav2_behaviors/Wait"}
    global_frame:        odom
    robot_base_frame:    base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel:  1.8
    min_rotational_vel:  0.4
    rotational_acc_lim:  3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate:       20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin:                 "nav2_waypoint_follower::WaitAtWaypoint"
      enabled:                true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency:  20.0
    scale_velocities:     false
    feedback:             "OPEN_LOOP"
    max_velocity:  [ 0.75,  0.75,  2.0]
    min_velocity:  [-0.50, -0.50, -2.0]
    max_accel:     [ 2.00,  2.00,  3.20]
    max_decel:     [-2.00, -2.00, -3.20]
    odom_topic:    "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout:   1.0